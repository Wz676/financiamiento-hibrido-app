<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financiamiento Híbrido App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsenui.css">
    <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsen-css-components.min.css">
    
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/onsenui/js/onsenui.min.js"></script>
</head>
<body>

    <ons-page id="main-app">
        <ons-tabbar position="bottom">
            <ons-tab page="inicio.html" label="Inicio" icon="md-home" active></ons-tab>
            <ons-tab page="simulador.html" label="Simulador" icon="md-car"></ons-tab>
            <ons-tab page="perfil.html" label="Scoring" icon="md-shield-check"></ons-tab>
        </ons-tabbar>
    </ons-page>

    <template id="inicio.html">
        <ons-page id="page-inicio">
            <ons-toolbar class="custom-toolbar">
                <div class="left" style="padding-left: 15px; display: flex; align-items: center;">
                    <img src="https://ui-avatars.com/api/?name=Usuario+VIP&background=4a90e2&color=fff&rounded=true&size=32" alt="Perfil" style="border-radius: 50%; box-shadow: 0 2px 5px rgba(74, 144, 226, 0.3);">
                </div>
                
                <div class="center" style="font-weight: 800; letter-spacing: -0.5px; font-size: 16px;">
                    Mi <span style="color: var(--accent-color);">Cartera</span>
                </div>
                
                <div class="right" style="padding-right: 10px;">
                    <ons-toolbar-button style="position: relative;">
                        <ons-icon icon="md-notifications-none" style="color: var(--text-color); font-size: 22px;"></ons-icon>
                        <span style="position: absolute; top: 12px; right: 10px; width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; border: 2px solid #ffffff;"></span>
                    </ons-toolbar-button>
                </div>
            </ons-toolbar>

            <div style="background: linear-gradient(135deg, #0a2540, #00d4ff); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                <p style="margin: 0; font-size: 14px; opacity: 0.9;">Saldo Disponible</p>
                
                <div class="saldo-capsula" onclick="toggleMoneda()">
                    <h1 id="saldo-actual">$0.00</h1>
                </div>
                
                <p style="margin: 0; font-size: 13px; cursor: pointer; color: #e0f7fa;" onclick="toggleMoneda()">
                    <ons-icon icon="md-swap"></ons-icon> Cambiar a <span id="texto-moneda">Bolívares</span>
                </p>

                <div style="margin-top: 15px; font-size: 11px; background: rgba(255,255,255,0.2); display: inline-block; padding: 5px 12px; border-radius: 20px;">
                    Tasa Oficial BCV: <b id="tasa-bcv-display">Cargando...</b> Bs/USD
                </div>
            </div>

            <div style="display: flex; justify-content: space-around; padding: 25px 15px 10px 15px;">
                <div class="action-btn" onclick="simularFondeo()" style="text-align: center; cursor: pointer; transition: transform 0.2s;">
                    <ons-fab style="background-color: #e0f7fa; color: #0a2540; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><ons-icon icon="md-plus"></ons-icon></ons-fab>
                    <p style="font-size: 12px; margin-top: 8px; color: #333; font-weight: bold;">Fondear</p>
                </div>
                <div class="action-btn" onclick="simularTransferencia()" style="text-align: center; cursor: pointer; transition: transform 0.2s;">
                    <ons-fab style="background-color: #e0f7fa; color: #0a2540; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><ons-icon icon="md-swap"></ons-icon></ons-fab>
                    <p style="font-size: 12px; margin-top: 8px; color: #333; font-weight: bold;">Transferir</p>
                </div>
                <div class="action-btn" onclick="simularPago()" style="text-align: center; cursor: pointer; transition: transform 0.2s;">
                    <ons-fab style="background-color: #e0f7fa; color: #0a2540; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><ons-icon icon="md-money-box"></ons-icon></ons-fab>
                    <p style="font-size: 12px; margin-top: 8px; color: #333; font-weight: bold;">Pagar</p>
                </div>
            </div>

            <ons-list style="margin-top: 15px; border-top: none;">
                <ons-list-header style="background-color: transparent; font-weight: bold; color: #0a2540; font-size: 14px;">Actividad Reciente</ons-list-header>
                <div id="lista-transacciones"></div>
            </ons-list>
        </ons-page>
    </template>

    <template id="simulador.html">
        <ons-page id="page-simulador">
            <ons-toolbar>
                <div class="center">Simulador Híbrido</div>
            </ons-toolbar>
            
            <div style="padding: 20px;">
                <p style="color: gray; font-size: 14px; text-align: center;">Tasa BCV Actual: <span id="tasa-bcv-simulador" style="color: #00d4ff; font-weight: bold;">Cargando...</span></p>

                <ons-list style="margin-top: 20px; border-radius: 8px;">
                    <ons-list-header>Selecciona un Vehículo (Catálogo Digital)</ons-list-header>
                    <div id="catalogo-vehiculos" style="display: flex; overflow-x: auto; padding: 15px; gap: 15px; background: #f9f9f9;"></div>

                    <ons-list-header style="margin-top: 10px;">O ingresa el valor manualmente</ons-list-header>
                    <ons-list-item>
                        <div class="center">
                            <ons-input id="monto-vehiculo" placeholder="Valor del Vehículo (USD)" type="number" modifier="underbar" style="width: 100%;" oninput="limpiarSeleccion(); calcularEcosistema();"></ons-input>
                        </div>
                    </ons-list-item>

                    <ons-list-item>
                        <div class="center" style="flex-direction: column; align-items: flex-start;">
                            <span style="font-size: 14px; color: #333;">Entrada Flexible (30% - 50%)</span>
                            <ons-range id="rango-entrada" min="30" max="50" value="30" style="width: 100%; margin-top: 10px;" 
                                oninput="document.getElementById('porcentaje-entrada').innerText = this.value; calcularEcosistema();">
                            </ons-range>
                            <div style="width: 100%; text-align: right; font-weight: bold; color: #0a2540;"><span id="porcentaje-entrada">30</span>%</div>
                        </div>
                    </ons-list-item>

                    <ons-list-item>
                        <div class="center" style="flex-direction: column; align-items: flex-start;">
                            <span style="font-size: 14px; color: #333;">Plazo de Financiamiento</span>
                            <ons-select id="plazo-meses" style="width: 100%; margin-top: 5px;" onchange="calcularEcosistema()">
                                <option value="12">12 Meses</option>
                                <option value="24" selected>24 Meses</option>
                                <option value="36">36 Meses</option>
                                <option value="48">48 Meses</option>
                            </ons-select>
                        </div>
                    </ons-list-item>
                </ons-list>

                <ons-list style="margin-top: 20px; border-radius: 8px;">
                    <ons-list-header>Estructura Híbrida de Financiamiento</ons-list-header>
                    <ons-list-item>
                        <div class="left">Pago Inicial (Fiat/Cripto):</div>
                        <div class="right" id="res-entrada" style="font-weight: bold;">$0.00</div>
                    </ons-list-item>
                    <ons-list-item>
                        <div class="left">Cuota Balloon (30% final):</div>
                        <div class="right" id="res-balloon" style="color: #00d4ff; font-weight: bold;">$0.00</div>
                    </ons-list-item>
                    <ons-list-item>
                        <div class="left" style="flex-direction: column; align-items: flex-start; justify-content: center;">
                            <span>Cuota Mensual Indexada:</span>
                            <span id="texto-meses-resultado" style="font-size: 11px; color: gray;">(Financiado a 24 meses)</span>
                        </div>
                        <div class="right" style="text-align: right;">
                            <div id="res-cuota-usd" style="color: #0a2540; font-weight: bold; font-size: 16px;">$0.00</div>
                            <div id="res-cuota-bs" style="color: gray; font-size: 12px;">Bs 0.00</div>
                        </div>
                    </ons-list-item>
                </ons-list>

                <section style="margin: 30px 0; text-align: center;">
                    <ons-button onclick="calcularEcosistema()" modifier="large" style="background-color: #0a2540;">Recalcular</ons-button>
                </section>
                
                <section id="btn-pagar-entrada" style="margin: 15px 0; text-align: center; display: none;">
                    <ons-button onclick="pagarEntradaDirecto()" modifier="large" style="background-color: #28a745;">Pagar Entrada y Reservar</ons-button>
                </section>
            </div>
        </ons-page>
    </template>

    <template id="perfil.html">
        <ons-page id="page-perfil">
            <ons-toolbar class="custom-toolbar">
                <div class="center">Mi Perfil Financiero</div>
            </ons-toolbar>

            <div class="page__content" style="padding: 15px; padding-bottom: 80px;">
                
                <div class="perfil-header-tech">
                    <img src="https://ui-avatars.com/api/?name=Usuario+VIP&background=4a90e2&color=fff&rounded=true&size=64" alt="Avatar">
                    <div class="perfil-info">
                        <h2>Usuario VIP</h2>
                        <p id="kyc-status-badge" class="badge-pending">Identidad no verificada</p>
                    </div>
                    <ons-button id="btn-kyc" modifier="quiet" onclick="iniciarKYC()" style="color: var(--accent-color); font-weight: 700;">Verificar</ons-button>
                </div>

                <div class="scoring-card">
                    <div class="score-left">
                        <span style="font-size: 12px; color: var(--text-color-muted); text-transform: uppercase; font-weight: 700;">Score Crediticio</span>
                        <div id="score-numero" style="font-size: 32px; font-weight: 800; color: var(--text-color); line-height: 1;">750</div>
                    </div>
                    <div class="score-right" style="text-align: right;">
                        <span style="color: #28a745; font-weight: 700; font-size: 14px;">Excelente</span>
                        <p style="margin: 0; font-size: 11px; color: var(--text-color-muted);">Apto para financiamiento</p>
                    </div>
                </div>

                <ons-list-header>Estructura de Financiamiento Activo</ons-list-header>
                
                <div class="chart-container" style="background: var(--bg-color-alt); border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 20px; position: relative; height: 260px;">
                    
                    <canvas id="graficoFinanciamiento"></canvas>
                    
                    <div id="chart-center-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none;">
                        <span style="font-size: 11px; color: var(--text-color-muted);">Total</span><br>
                        <b id="chart-total-value" style="color: var(--text-color); font-size: 16px;">$0</b>
                    </div>
                </div>

                <div id="chart-leyenda" style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px;"></div>

                <ons-list-header>Próximos Vencimientos</ons-list-header>
                <ons-list id="lista-vencimientos" style="background: transparent; margin-bottom: 20px;">
                    </ons-list>

                <ons-list-header>Configuración del Sistema</ons-list-header>
                <ons-list style="border-radius: 12px; overflow: hidden; margin-bottom: 25px; background: var(--bg-color-alt); box-shadow: 0 4px 6px rgba(0,0,0,0.03); border: 1px solid var(--border-color);">
                    <ons-list-item modifier="chevron" tappable>
                        <div class="left"><ons-icon icon="md-file-text" style="color: var(--accent-color);"></ons-icon></div>
                        <div class="center" style="font-size: 14px;">Términos de Servicio</div>
                    </ons-list-item>
                    <ons-list-item modifier="chevron" tappable>
                        <div class="left"><ons-icon icon="md-shield-check" style="color: var(--accent-color);"></ons-icon></div>
                        <div class="center" style="font-size: 14px;">Política de Privacidad</div>
                    </ons-list-item>
                </ons-list>

                <section style="margin-bottom: 30px; text-align: center;">
                    <ons-button modifier="large" style="background-color: #dc3545; color: #ffffff;" onclick="resetearApp()">Cerrar Sesión / Borrar Datos</ons-button>
                </section>
                
            </div>
        </ons-page>
    </template>

    <script src="app.js"></script>
</body>
</html>
